name: Backend CI

on:
  push:
    branches: [main]
    paths: ['backend/**', 'data/**', '.github/workflows/backend-ci.yml']
  pull_request:
    paths: ['backend/**', 'data/**']

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements/dev.txt -r backend/requirements.txt
      - run: pytest tests/ -v
